<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 宇宙ロシア語 単語帳</title>
<style>
:root { --gold:#C9A84C; --dark:#07070f; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { background:var(--dark); color:#fff; font-family:'Helvetica Neue',Arial,sans-serif; }

/* ── Stars ── */
.stars-bg {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 7% 6%,#fff,transparent),
    radial-gradient(1px 1px at 22% 14%,rgba(255,255,255,.7),transparent),
    radial-gradient(1.5px 1.5px at 38% 4%,#fff,transparent),
    radial-gradient(1px 1px at 53% 20%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 68% 9%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 84% 17%,rgba(255,255,255,.8),transparent),
    radial-gradient(1px 1px at 94% 33%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 4% 41%,#fff,transparent),
    radial-gradient(1px 1px at 17% 54%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 31% 47%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 47% 61%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 62% 69%,#fff,transparent),
    radial-gradient(1px 1px at 77% 57%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 89% 74%,rgba(255,255,255,.8),transparent),
    radial-gradient(1px 1px at 11% 81%,#fff,transparent),
    radial-gradient(1px 1px at 34% 87%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.5px 1.5px at 59% 91%,#fff,transparent),
    radial-gradient(1px 1px at 74% 84%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 49% 49%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 21% 29%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 43% 72%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 86% 42%,rgba(255,255,255,.55),transparent),
    radial-gradient(1.5px 1.5px at 3% 68%,#fff,transparent),
    radial-gradient(1px 1px at 66% 38%,rgba(255,255,255,.4),transparent);
}

/* ═══════════════════════════════════════
   PAGE: TOC
═══════════════════════════════════════ */
#page-toc {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease;
}
#page-toc.hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }

.toc-header {
  padding:20px 20px 10px;
  text-align:center; flex-shrink:0;
  background:linear-gradient(180deg,rgba(7,7,15,.95) 70%,transparent);
}
.toc-logo { font-size:8px; letter-spacing:5px; color:rgba(201,168,76,.45); margin-bottom:6px; }
.toc-title {
  font-size:22px; font-weight:900; letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),#fff 55%,var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.toc-sub { font-size:9px; color:#3a3a50; letter-spacing:3px; margin-bottom:2px; }

.toc-scroll {
  flex:1; overflow-y:auto; padding:10px 12px 24px;
  -webkit-overflow-scrolling:touch;
}
.toc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.toc-item {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px; padding:13px 10px;
  cursor:pointer; transition:all .18s;
  display:flex; flex-direction:column; gap:3px;
  position:relative; overflow:hidden;
}
.toc-item::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--c,transparent) 0%,transparent 70%);
  opacity:.06; pointer-events:none;
}
.toc-item:active { transform:scale(.96); background:rgba(255,255,255,.09); }
.toc-day  { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--c,#4a78dc); }
.toc-word { font-size:20px; font-weight:900; color:#fff; line-height:1.1; }
.toc-meaning { font-size:11px; color:#666; margin-top:1px; }

/* ═══════════════════════════════════════
   PAGE: FLASHCARD
═══════════════════════════════════════ */
#page-card {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease;
  overflow:hidden;
}
#page-card.hidden { transform:translateY(100%); opacity:0; pointer-events:none; }

/* Top bar */
.card-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 6px; flex-shrink:0; z-index:2;
}
.back-btn {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#888; font-size:11px; padding:7px 15px; border-radius:20px;
  cursor:pointer; transition:all .2s; letter-spacing:1px;
}
.back-btn:active { background:rgba(255,255,255,.16); color:#fff; }
.card-day-badge {
  font-size:10px; font-weight:700; letter-spacing:3px;
  padding:5px 16px; border-radius:14px; border:1px solid;
}
.speak-btn {
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#888; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.speak-btn:active { background:rgba(201,168,76,.25); border-color:var(--gold); color:var(--gold); }

/* Main card body */
.card-main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0 28px; z-index:2; text-align:center;
  user-select:none;
}
.card-word {
  font-size:clamp(54px,16vw,100px); font-weight:900;
  line-height:1.05; letter-spacing:2px; margin-bottom:14px;
}
.card-stress {
  font-size:15px; color:rgba(255,255,255,.38);
  letter-spacing:2px; font-style:italic; margin-bottom:10px;
}
.card-romaji {
  font-size:17px; color:rgba(255,255,255,.6);
  letter-spacing:3px; margin-bottom:22px;
}
.card-divider {
  width:56px; height:2px; border-radius:1px; margin-bottom:20px;
}
.card-meaning {
  font-size:30px; font-weight:700; letter-spacing:2px;
}

/* Bottom */
.card-bottom {
  flex-shrink:0; padding:10px 24px 26px;
  display:flex; flex-direction:column; gap:12px;
  align-items:center; z-index:2;
}
.card-counter { font-size:10px; color:#444; letter-spacing:3px; }
.card-nav { display:flex; align-items:center; gap:20px; }
.nav-btn {
  width:54px; height:54px; border-radius:50%;
  border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.65); font-size:26px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; line-height:1;
}
.nav-btn:active { background:rgba(255,255,255,.15); color:#fff; }
.nav-btn:disabled { opacity:.18; cursor:default; }
.progress-bar {
  width:100%; height:3px;
  background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg,var(--gold),#fff);
  transition:width .3s ease;
}

/* Swipe animation */
.card-main.fx-left  { animation:fxLeft  .28s ease forwards; }
.card-main.fx-right { animation:fxRight .28s ease forwards; }
@keyframes fxLeft  { 0%{opacity:1;transform:none} 40%{opacity:0;transform:translateX(-28px)} 41%{opacity:0;transform:translateX(28px)} 100%{opacity:1;transform:none} }
@keyframes fxRight { 0%{opacity:1;transform:none} 40%{opacity:0;transform:translateX(28px)} 41%{opacity:0;transform:translateX(-28px)} 100%{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="stars-bg"></div>

<!-- ── TOC ── -->
<div id="page-toc">
  <div class="toc-header">
    <div class="toc-logo">🚀 HAMA × SPACE RUSSIAN</div>
    <div class="toc-title">宇宙ロシア語 単語帳</div>
    <div class="toc-sub">タップして学習スタート — 28 WORDS</div>
  </div>
  <div class="toc-scroll">
    <div class="toc-grid" id="toc-grid"></div>
  </div>
</div>

<!-- ── FLASHCARD ── -->
<div id="page-card" class="hidden">
  <div class="card-topbar">
    <button class="back-btn" id="back-btn">← 一覧</button>
    <div class="card-day-badge" id="card-day">DAY 01</div>
    <button class="speak-btn" id="speak-btn">🔊</button>
  </div>
  <div class="card-main" id="card-main">
    <div class="card-word"   id="card-word"></div>
    <div class="card-stress" id="card-stress"></div>
    <div class="card-romaji" id="card-romaji"></div>
    <div class="card-divider" id="card-divider"></div>
    <div class="card-meaning" id="card-meaning"></div>
  </div>
  <div class="card-bottom">
    <div class="card-counter" id="card-counter">1 / 28</div>
    <div class="card-nav">
      <button class="nav-btn" id="prev-btn">‹</button>
      <button class="nav-btn" id="next-btn">›</button>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>
</div>

<script>
const WORDS = [
  {day:1,  word:"Привет",     stress:"Приве́т",      romaji:"プリヴィエット",      meaning:"こんにちは",   color:"#4a78dc"},
  {day:2,  word:"Спасибо",    stress:"Спаси́бо",     romaji:"スパシーバ",          meaning:"ありがとう",   color:"#32c87a"},
  {day:3,  word:"Мечта",      stress:"Мечта́",       romaji:"ミェチュタ",          meaning:"夢",           color:"#C9A84C"},
  {day:4,  word:"Космос",     stress:"Ко́смос",      romaji:"コースモス",          meaning:"宇宙",         color:"#7846dc"},
  {day:5,  word:"Удача",      stress:"Уда́ча",       romaji:"ウダーチャ",          meaning:"幸運",         color:"#9646c8"},
  {day:6,  word:"Сила",       stress:"Си́ла",        romaji:"スィーラ",            meaning:"力",           color:"#dc6023"},
  {day:7,  word:"Вперёд",     stress:"Вперёд",       romaji:"フピリョート",        meaning:"前へ！",       color:"#C9A84C"},
  {day:8,  word:"Земля",      stress:"Земля́",       romaji:"ジムリャー",          meaning:"地球",         color:"#3c82dc"},
  {day:9,  word:"Луна",       stress:"Луна́",        romaji:"ルナ",                meaning:"月",           color:"#b4b4dc"},
  {day:10, word:"Звезда",     stress:"Звезда́",      romaji:"ズヴィズダー",        meaning:"星",           color:"#ffd040"},
  {day:11, word:"Ракета",     stress:"Раке́та",      romaji:"ラケータ",            meaning:"ロケット",     color:"#ff6432"},
  {day:12, word:"Полёт",      stress:"Полёт",        romaji:"パリョート",          meaning:"飛行",         color:"#5096ff"},
  {day:13, word:"Скафандр",   stress:"Скафа́ндр",    romaji:"スカファンドル",      meaning:"宇宙服",       color:"#32c8b4"},
  {day:14, word:"Орбита",     stress:"Орби́та",      romaji:"アルビータ",          meaning:"軌道",         color:"#8c50e6"},
  {day:15, word:"Станция",    stress:"Ста́нция",     romaji:"スタンツィヤ",        meaning:"ステーション", color:"#4678e6"},
  {day:16, word:"Гравитация", stress:"Грави́тация",  romaji:"グラヴィタツィヤ",    meaning:"重力",         color:"#a050f0"},
  {day:17, word:"Связь",      stress:"Связь",        romaji:"スヴャーシ",          meaning:"通信",         color:"#32b4dc"},
  {day:18, word:"Воздух",     stress:"Во́здух",      romaji:"ヴォーズドゥフ",      meaning:"空気",         color:"#32d28c"},
  {day:19, word:"Открытие",   stress:"Откры́тие",    romaji:"アトクルィーティエ",  meaning:"発見",         color:"#C9A84C"},
  {day:20, word:"Команда",    stress:"Кома́нда",     romaji:"カマンダ",            meaning:"チーム",       color:"#5096ff"},
  {day:21, word:"Победа",     stress:"Побе́да",      romaji:"パベーダ",            meaning:"勝利",         color:"#C9A84C"},
  {day:22, word:"Терпение",   stress:"Терпе́ние",    romaji:"チルピェーニエ",      meaning:"忍耐",         color:"#8264dc"},
  {day:23, word:"Надежда",    stress:"Наде́жда",     romaji:"ナジェージュダ",      meaning:"希望",         color:"#C9A84C"},
  {day:24, word:"Знание",     stress:"Зна́ние",      romaji:"ズナーニエ",          meaning:"知識",         color:"#5096ff"},
  {day:25, word:"Путь",       stress:"Путь",         romaji:"プーチ",              meaning:"道",           color:"#32b4dc"},
  {day:26, word:"Сердце",     stress:"Се́рдце",      romaji:"スィェールツェ",      meaning:"心",           color:"#e63c64"},
  {day:27, word:"Вселенная",  stress:"Вселе́нная",   romaji:"フスィリェーンナヤ",  meaning:"宇宙全体",     color:"#b482ff"},
  {day:28, word:"Будущее",    stress:"Бу́дущее",     romaji:"ブドゥシチエ",        meaning:"未来",         color:"#C9A84C"},
];

let cur = 0;

// ── Build TOC ──
const grid = document.getElementById('toc-grid');
WORDS.forEach((w, i) => {
  const el = document.createElement('div');
  el.className = 'toc-item';
  el.style.setProperty('--c', w.color);
  el.innerHTML = `<div class="toc-day">DAY ${String(w.day).padStart(2,'0')}</div>
    <div class="toc-word">${w.word}</div>
    <div class="toc-meaning">${w.meaning}</div>`;
  el.addEventListener('click', () => openCard(i, null));
  grid.appendChild(el);
});

// ── Open card ──
function openCard(index, fx) {
  cur = index;
  render(fx);
  document.getElementById('page-toc').classList.add('hidden');
  document.getElementById('page-card').classList.remove('hidden');
  speakNow();
}

// ── Render card ──
function render(fx) {
  const w = WORDS[cur];
  const main = document.getElementById('card-main');
  if (fx) {
    main.classList.add(fx);
    setTimeout(() => main.classList.remove(fx), 300);
  }
  document.getElementById('card-day').textContent = `DAY ${String(w.day).padStart(2,'0')}`;
  document.getElementById('card-day').style.cssText = `border-color:${w.color};color:${w.color}`;
  document.getElementById('card-word').textContent = w.word;
  document.getElementById('card-word').style.cssText = `color:${w.color};text-shadow:0 0 40px ${w.color}55,0 0 80px ${w.color}22`;
  document.getElementById('card-stress').textContent = w.stress;
  document.getElementById('card-romaji').textContent = w.romaji;
  document.getElementById('card-divider').style.background = `linear-gradient(90deg,transparent,${w.color},transparent)`;
  document.getElementById('card-meaning').textContent = w.meaning;
  document.getElementById('card-meaning').style.color = w.color;
  document.getElementById('card-counter').textContent = `${cur + 1} / ${WORDS.length}`;
  document.getElementById('prog-fill').style.width = `${((cur + 1) / WORDS.length) * 100}%`;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === WORDS.length - 1;
}

// ── Navigate ──
function go(dir) {
  const n = cur + dir;
  if (n < 0 || n >= WORDS.length) return;
  cur = n;
  render(dir > 0 ? 'fx-left' : 'fx-right');
  speakNow();
}
document.getElementById('prev-btn').addEventListener('click', () => go(-1));
document.getElementById('next-btn').addEventListener('click', () => go(1));

// ── Back ──
document.getElementById('back-btn').addEventListener('click', () => {
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('page-card').classList.add('hidden');
  document.getElementById('page-toc').classList.remove('hidden');
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (document.getElementById('page-card').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    go(-1);
  if (e.key === 'Escape') document.getElementById('back-btn').click();
});

// ── Swipe ──
let tx = 0, ty = 0;
const cardPage = document.getElementById('page-card');
cardPage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive:true });
cardPage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
});

// ── Speak ──
function speakNow() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(WORDS[cur].word);
    u.lang = 'ru-RU'; u.rate = 0.75; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }, 320);
}
document.getElementById('speak-btn').addEventListener('click', speakNow);
</script>
</body>
</html>
