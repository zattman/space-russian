<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 宇宙ロシア語 単語帳</title>
<style>
:root { --gold:#C9A84C; --dark:#07070f; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { background:var(--dark); color:#fff; font-family:'Helvetica Neue',Arial,sans-serif; }

/* ── Ambient stars (body layer) ── */
.stars-bg {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 7%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 23% 15%,rgba(255,255,255,.45),transparent),
    radial-gradient(1.5px 1.5px at 39% 5%,rgba(255,255,255,.60),transparent),
    radial-gradient(1px 1px at 54% 21%,rgba(255,255,255,.40),transparent),
    radial-gradient(1px 1px at 69% 10%,rgba(255,255,255,.55),transparent),
    radial-gradient(1.5px 1.5px at 85% 18%,rgba(255,255,255,.65),transparent),
    radial-gradient(1px 1px at 95% 34%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 5% 42%,rgba(255,255,255,.50),transparent),
    radial-gradient(1px 1px at 18% 55%,rgba(255,255,255,.40),transparent),
    radial-gradient(1px 1px at 32% 48%,rgba(255,255,255,.50),transparent),
    radial-gradient(1.5px 1.5px at 48% 62%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 63% 70%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 78% 58%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 90% 75%,rgba(255,255,255,.60),transparent),
    radial-gradient(1px 1px at 12% 82%,rgba(255,255,255,.50),transparent),
    radial-gradient(1px 1px at 35% 88%,rgba(255,255,255,.40),transparent),
    radial-gradient(1.5px 1.5px at 60% 92%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 75% 85%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 50% 50%,rgba(255,255,255,.30),transparent),
    radial-gradient(1px 1px at 22% 30%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 44% 73%,rgba(255,255,255,.38),transparent),
    radial-gradient(1px 1px at 87% 43%,rgba(255,255,255,.42),transparent),
    radial-gradient(1.5px 1.5px at 4% 69%,rgba(255,255,255,.48),transparent),
    radial-gradient(1px 1px at 67% 39%,rgba(255,255,255,.32),transparent);
}

/* ═══════════════════════════ TOC ═══════════════════════════ */
#page-toc {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease;
}
#page-toc.hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }

.toc-header {
  padding:22px 20px 12px; text-align:center; flex-shrink:0;
  background:linear-gradient(180deg,rgba(7,7,15,.96) 65%,transparent);
}
.toc-logo  { font-size:8px; letter-spacing:6px; color:rgba(201,168,76,.38); margin-bottom:8px; }
.toc-title {
  font-size:20px; font-weight:900; letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),#fff 55%,var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px;
}
.toc-sub { font-size:8px; color:#2e2e48; letter-spacing:4px; }
.toc-scroll { flex:1; overflow-y:auto; padding:10px 12px 24px; -webkit-overflow-scrolling:touch; }
.toc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.toc-item {
  background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.065);
  border-radius:12px; padding:14px 11px; cursor:pointer;
  transition:all .18s; display:flex; flex-direction:column; gap:3px;
  position:relative; overflow:hidden;
}
.toc-item::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--c,transparent) 0%,transparent 68%);
  opacity:.055; pointer-events:none;
}
.toc-item:active { transform:scale(.96); }
.toc-day     { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--c,#4a78dc); }
.toc-word    { font-size:21px; font-weight:900; color:#fff; line-height:1.1; }
.toc-meaning { font-size:11px; color:#555; margin-top:2px; }

/* ═══════════════════════════ FLASHCARD ═══════════════════════════ */
#page-card {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease; overflow:hidden;
}
#page-card.hidden { transform:translateY(100%); opacity:0; pointer-events:none; }

/* ── Top bar ── */
.card-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 20px 8px; flex-shrink:0; z-index:2; position:relative;
}
.back-btn {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10);
  color:#777; font-size:10px; padding:7px 15px; border-radius:20px;
  cursor:pointer; letter-spacing:1.5px; transition:all .2s;
}
.back-btn:active { background:rgba(255,255,255,.14); color:#ccc; }
.card-day-badge {
  font-size:9px; font-weight:700; letter-spacing:4px;
  padding:5px 16px; border-radius:14px; border:1px solid;
}
.speak-btn {
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10);
  color:#777; font-size:17px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.speak-btn:active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.15); }

/* ── Main ── */
.card-main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:2; text-align:center;
  user-select:none; cursor:pointer;
  position:relative; overflow:hidden;
  /* padding kept small so background is visible */
  padding:0 32px;
}

/* ── Space illustration (CSS gradient art) ── */
.card-scene {
  position:absolute; inset:0; pointer-events:none;
  z-index:0; transition:background-image .4s ease;
}

/* ── Emoji watermark ── */
.card-emoji {
  position:absolute; pointer-events:none;
  z-index:1; bottom:6%; right:-1%;
  font-size:clamp(110px, 30vw, 155px);
  line-height:1; opacity:0.06;
  transform:rotate(-10deg);
  transition:opacity .3s; user-select:none;
}
.card-main.ex-open .card-emoji { opacity:0.028; }

/* ── Word section ── */
.word-section {
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none; position:relative; z-index:2;
  transition:transform .35s ease;
}
.card-main.ex-open .word-section { transform:translateY(-16px); }

/* Distinction-style category chip */
.card-cat {
  font-size:8px; font-weight:700; letter-spacing:4px;
  margin-bottom:14px; opacity:.55; text-transform:uppercase;
}

/* THE word — hero element */
.card-word {
  font-size:clamp(50px,14.5vw,92px); font-weight:900;
  line-height:1.02; letter-spacing:1px; margin-bottom:12px;
}

/* Phonetics — single compact row (Distinction style) */
.card-phonetics {
  display:flex; align-items:center; gap:8px; margin-bottom:20px;
}
.pho-stress { font-size:13px; color:rgba(255,255,255,.32); font-style:italic; letter-spacing:1.5px; }
.pho-sep    { font-size:11px; color:rgba(255,255,255,.12); }
.pho-kana   { font-size:14px; color:rgba(255,255,255,.52); letter-spacing:2px; }

/* Divider line */
.card-line  { width:52px; height:1.5px; border-radius:1px; margin-bottom:18px; }

/* Meaning */
.card-meaning { font-size:28px; font-weight:700; letter-spacing:2px; }

.tap-hint {
  font-size:8px; color:rgba(255,255,255,.15); letter-spacing:4px; margin-top:18px;
  transition:opacity .3s;
}
.card-main.ex-open .tap-hint { opacity:0; }

/* ── Example bottom sheet ── */
.ex-panel {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(7,7,18,0.97); backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.09);
  border-radius:22px 22px 0 0;
  padding:6px 24px 22px;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);
  z-index:5; cursor:default;
}
.ex-panel.show { transform:translateY(0); }
.ex-handle   { width:34px; height:3px; background:rgba(255,255,255,.12); border-radius:2px; margin:0 auto 14px; }
.ex-tag-row  { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ex-tag      { font-size:8px; font-weight:700; letter-spacing:3px; }
.ex-speak-btn {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10);
  color:#777; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
  flex-shrink:0;
}
.ex-speak-btn:active  { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.18); }
.ex-speak-btn.playing { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.12); }
.ex-ru       { font-size:16px; font-weight:600; color:#e4e4e4; line-height:1.5; margin-bottom:4px; }
.ex-jp       { font-size:13px; color:#666; margin-bottom:12px; line-height:1.4; }
.ex-hr       { height:1px; background:rgba(255,255,255,.06); margin-bottom:10px; }
.ex-naze-tag { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }
.ex-naze     { font-size:12px; color:#888; line-height:1.7; }

/* ── Bottom nav ── */
.card-bottom {
  flex-shrink:0; padding:10px 24px 26px;
  display:flex; flex-direction:column; gap:12px;
  align-items:center; z-index:2;
}
.card-counter { font-size:9px; color:#333; letter-spacing:4px; }
.card-nav     { display:flex; align-items:center; gap:20px; }
.nav-btn {
  width:54px; height:54px; border-radius:50%;
  border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.55); font-size:26px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s; line-height:1;
}
.nav-btn:active   { background:rgba(255,255,255,.13); color:#fff; }
.nav-btn:disabled { opacity:.14; cursor:default; }
.progress-bar  { width:100%; height:2px; background:rgba(255,255,255,.06); border-radius:1px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),rgba(255,255,255,.8)); transition:width .3s ease; }

/* ── Animations ── */
.card-main.fx-l { animation:fxL .28s ease forwards; }
.card-main.fx-r { animation:fxR .28s ease forwards; }
@keyframes fxL { 0%{opacity:1;transform:none} 38%{opacity:0;transform:translateX(-26px)} 39%{opacity:0;transform:translateX(26px)} 100%{opacity:1;transform:none} }
@keyframes fxR { 0%{opacity:1;transform:none} 38%{opacity:0;transform:translateX(26px)} 39%{opacity:0;transform:translateX(-26px)} 100%{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="stars-bg"></div>

<!-- ── TOC ── -->
<div id="page-toc">
  <div class="toc-header">
    <div class="toc-logo">HAMA × SPACE RUSSIAN</div>
    <div class="toc-title">宇宙ロシア語 単語帳</div>
    <div class="toc-sub">TAP A WORD · 28 DAYS</div>
  </div>
  <div class="toc-scroll"><div class="toc-grid" id="toc-grid"></div></div>
</div>

<!-- ── FLASHCARD ── -->
<div id="page-card" class="hidden">
  <div class="card-topbar">
    <button class="back-btn" id="back-btn">← 一覧</button>

    <div class="card-nav">
      <button class="nav-btn" id="prev-btn">‹</button>
      <button class="nav-btn" id="next-btn">›</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────
   CSS ART GENERATOR — space-themed backgrounds
───────────────────────────────────────────── */
function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function mkBg(type, R, G, B) {
  const c = (a) => `rgba(${R},${G},${B},${a})`;
  const w = (a) => `rgba(255,255,255,${a})`;
  switch(type) {

    case 'planet': // large glowing sphere bottom-right
      return [
        `radial-gradient(circle 260px at 82% 87%, ${c(.38)} 0%, ${c(.14)} 44%, transparent 66%)`,
        `radial-gradient(circle 120px at 82% 87%, ${c(.55)} 0%, ${c(.20)} 50%, transparent 70%)`,
        `radial-gradient(circle 50px  at 82% 87%, ${w(.18)} 0%, transparent 50%)`,
        `radial-gradient(circle 245px at 82% 87%, transparent 228px, ${c(.22)} 232px, transparent 248px)`,
      ].join(',');

    case 'moon': // cooler sphere upper-right
      return [
        `radial-gradient(circle 210px at 80% 22%, ${c(.36)} 0%, ${c(.10)} 44%, transparent 65%)`,
        `radial-gradient(circle 96px  at 80% 22%, ${c(.55)} 0%, ${c(.18)} 50%, transparent 70%)`,
        `radial-gradient(circle 40px  at 80% 22%, ${w(.18)} 0%, transparent 50%)`,
        `radial-gradient(circle 205px at 80% 22%, transparent 190px, ${c(.18)} 194px, transparent 208px)`,
      ].join(',');

    case 'star': // bright star with halo upper area
      return [
        `radial-gradient(circle 200px at 68% 26%, ${c(.28)} 0%, transparent 56%)`,
        `radial-gradient(circle 48px  at 68% 26%, ${c(.70)} 0%, transparent 50%)`,
        `radial-gradient(circle 12px  at 68% 26%, ${w(.88)} 0%, transparent 50%)`,
        `radial-gradient(2.5px 2.5px at 25% 55%, ${w(.70)}, transparent)`,
        `radial-gradient(2px 2px at 82% 65%, ${w(.62)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 12% 30%, ${w(.55)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 55% 80%, ${w(.48)}, transparent)`,
      ].join(',');

    case 'rocket': // rocket exhaust column from bottom
      return [
        `radial-gradient(ellipse 70px 340px at 50% 105%, ${c(.38)} 0%, transparent 56%)`,
        `radial-gradient(ellipse 32px 180px at 50% 105%, rgba(255,200,80,.42) 0%, transparent 46%)`,
        `radial-gradient(ellipse 14px 80px  at 50% 105%, ${w(.30)} 0%, transparent 40%)`,
        `radial-gradient(circle 55px at 50% 80%, ${c(.22)} 0%, transparent 50%)`,
        `radial-gradient(circle 28px at 50% 78%, ${c(.30)} 0%, transparent 50%)`,
      ].join(',');

    case 'nebula': // soft interstellar cloud
      return [
        `radial-gradient(ellipse 340px 220px at 62% 40%, ${c(.22)} 0%, transparent 56%)`,
        `radial-gradient(ellipse 220px 170px at 28% 68%, ${c(.16)} 0%, transparent 52%)`,
        `radial-gradient(ellipse 160px 95px  at 75% 72%, ${c(.18)} 0%, transparent 48%)`,
        `radial-gradient(2px 2px at 15% 20%, ${w(.62)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 55% 35%, ${w(.52)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 85% 15%, ${w(.58)}, transparent)`,
        `radial-gradient(1px 1px at 40% 70%, ${w(.42)}, transparent)`,
      ].join(',');

    case 'orbit': // orbital ring around a small planet
      return [
        `radial-gradient(circle 62px at 50% 74%, ${c(.32)} 0%, transparent 50%)`,
        `radial-gradient(circle 30px at 50% 74%, ${c(.55)} 0%, transparent 50%)`,
        `radial-gradient(ellipse 280px 95px at 50% 74%, transparent 148px, ${c(.24)} 152px, transparent 160px)`,
        `radial-gradient(ellipse 215px 72px at 50% 74%, transparent 108px, ${c(.18)} 112px, transparent 120px)`,
        `radial-gradient(circle 14px at 88% 52%, ${c(.65)} 0%, transparent 50%)`,
        `radial-gradient(circle 7px  at 88% 52%, ${w(.40)} 0%, transparent 50%)`,
      ].join(',');

    case 'signal': // concentric radio rings from a point
      return [
        `radial-gradient(circle 230px at 78% 42%, transparent 162px, ${c(.24)} 166px, transparent 172px)`,
        `radial-gradient(circle 230px at 78% 42%, transparent 124px, ${c(.20)} 128px, transparent 134px)`,
        `radial-gradient(circle 230px at 78% 42%, transparent 90px,  ${c(.18)} 94px,  transparent 100px)`,
        `radial-gradient(circle 230px at 78% 42%, transparent 60px,  ${c(.15)} 63px,  transparent 69px)`,
        `radial-gradient(circle 20px at 78% 42%, ${c(.55)} 0%, transparent 50%)`,
        `radial-gradient(circle 8px  at 78% 42%, ${w(.75)} 0%, transparent 50%)`,
      ].join(',');

    case 'horizon': // dawn/sunset glow at bottom
      return [
        `radial-gradient(ellipse 440px 140px at 50% 100%, ${c(.45)} 0%, transparent 56%)`,
        `radial-gradient(ellipse 300px 80px  at 50% 100%, ${c(.28)} 0%, transparent 50%)`,
        `linear-gradient(to top, ${c(.14)} 0%, transparent 28%)`,
        `radial-gradient(2px 2px at 20% 40%, ${w(.62)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 60% 28%, ${w(.55)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 80% 55%, ${w(.48)}, transparent)`,
      ].join(',');

    case 'wave': // flowing gravitational/atmospheric waves
      return [
        `radial-gradient(ellipse 360px 80px at 50% 38%, ${c(.20)} 0%, transparent 50%)`,
        `radial-gradient(ellipse 320px 65px at 50% 52%, ${c(.16)} 0%, transparent 50%)`,
        `radial-gradient(ellipse 270px 52px at 50% 64%, ${c(.12)} 0%, transparent 50%)`,
        `radial-gradient(ellipse 200px 40px at 50% 75%, ${c(.09)} 0%, transparent 50%)`,
        `radial-gradient(ellipse 130px 28px at 50% 84%, ${c(.07)} 0%, transparent 50%)`,
      ].join(',');

    case 'heart': // warm centered glow
      return [
        `radial-gradient(ellipse 240px 195px at 50% 42%, ${c(.32)} 0%, transparent 54%)`,
        `radial-gradient(circle 80px  at 50% 38%, ${c(.50)} 0%, transparent 50%)`,
        `radial-gradient(circle 32px  at 50% 36%, ${c(.45)} 0%, transparent 50%)`,
        `radial-gradient(circle 12px  at 50% 34%, ${w(.22)} 0%, transparent 50%)`,
      ].join(',');

    case 'particles': // scattered stars / constellation
      return [
        `radial-gradient(3px 3px at 12% 35%, ${w(.72)}, transparent)`,
        `radial-gradient(3px 3px at 72% 18%, ${w(.65)}, transparent)`,
        `radial-gradient(2.5px 2.5px at 52% 62%, ${w(.58)}, transparent)`,
        `radial-gradient(2px 2px at 28% 72%, ${w(.52)}, transparent)`,
        `radial-gradient(3px 3px at 83% 52%, ${w(.60)}, transparent)`,
        `radial-gradient(2px 2px at 40% 28%, ${w(.48)}, transparent)`,
        `radial-gradient(2px 2px at 65% 80%, ${w(.45)}, transparent)`,
        `radial-gradient(1.5px 1.5px at 18% 60%, ${w(.40)}, transparent)`,
        `radial-gradient(circle 160px at 50% 50%, ${c(.14)} 0%, transparent 60%)`,
      ].join(',');

    default:
      return `radial-gradient(circle 180px at 68% 68%, ${c(.22)} 0%, transparent 56%)`;
  }
}

/* ─────────────────────── WORDS ─────────────────────── */
const WORDS = [
  {day:1,  word:"Привет",     stress:"Приве́т",      kana:"プリヴィエット",      meaning:"こんにちは",   color:"#4a78dc", emoji:"👋", cat:"感嘆詞", bg:"particles",
   ex_ru:"Привет из космоса! Земля, ты прекрасна!",
   ex_jp:"宇宙からこんにちは！地球、めっちゃキレイやん！",
   naze:"宇宙への第一歩はここから。ドッキング成功直後に叫ぶ「Привет！」が人生最高の瞬間になる予定。"},

  {day:2,  word:"Спасибо",    stress:"Спаси́бо",     kana:"スパシーバ",          meaning:"ありがとう",   color:"#32c87a", emoji:"🙏", cat:"感嘆詞", bg:"particles",
   ex_ru:"Спасибо, что не уронил отвёртку!",
   ex_jp:"ドライバー落とさないでくれてありがとう！",
   naze:"宇宙では工具を落としたら軌道の向こう側へ消える。「スパシーバ」の重みが地上とは全然違う。"},

let cur = 0, exOpen = false;

/* ── Build TOC ── */
const tocGrid = document.getElementById('toc-grid');
WORDS.forEach((w, i) => {
  const el = document.createElement('div');
  el.className = 'toc-item';
  el.style.setProperty('--c', w.color);
  el.innerHTML = `<div class="toc-day">DAY ${String(w.day).padStart(2,'0')}</div>
    <div class="toc-word">${w.word}</div>
    <div class="toc-meaning">${w.meaning}</div>`;
  el.addEventListener('click', () => openCard(i));
  tocGrid.appendChild(el);
});

/* ── Open card ── */
function openCard(idx) {
  cur = idx; exOpen = false;
  render(null);
  document.getElementById('page-toc').classList.add('hidden');
  document.getElementById('page-card').classList.remove('hidden');
  speakNow();
}

/* ── Render ── */
function render(fx) {
  const w = WORDS[cur];
  const main  = document.getElementById('card-main');
  const panel = document.getElementById('ex-panel');
  exOpen = false;
  main.classList.remove('ex-open');
  panel.classList.remove('show');

  if (fx) {
    main.classList.add(fx);
    setTimeout(() => main.classList.remove(fx), 300);
  }

  /* Space art background */
  const [R,G,B] = hexRgb(w.color);
  document.getElementById('card-scene').style.backgroundImage = mkBg(w.bg, R, G, B);

  /* Emoji watermark */
  document.getElementById('card-emoji').textContent = w.emoji;

  /* Typography */
  document.getElementById('card-cat').textContent   = w.cat;
  document.getElementById('card-cat').style.color   = w.color;
  document.getElementById('card-day').textContent   = `DAY ${String(w.day).padStart(2,'0')}`;
  document.getElementById('card-day').style.cssText = `border-color:${w.color};color:${w.color}`;
  document.getElementById('card-word').textContent  = w.word;
  document.getElementById('card-word').style.cssText= `color:${w.color};text-shadow:0 0 36px ${w.color}44,0 0 72px ${w.color}18`;
  document.getElementById('pho-stress').textContent = w.stress;
  document.getElementById('pho-kana').textContent   = w.kana;
  document.getElementById('card-line').style.background = `linear-gradient(90deg,transparent,${w.color},transparent)`;
  document.getElementById('card-meaning').textContent = w.meaning;
  document.getElementById('card-meaning').style.color  = w.color;
  document.getElementById('card-counter').textContent  = `${cur + 1} / ${WORDS.length}`;
  document.getElementById('prog-fill').style.width     = `${((cur + 1) / WORDS.length) * 100}%`;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === WORDS.length - 1;

  /* Example panel */
  document.getElementById('ex-tag').style.color = w.color;
  document.getElementById('ex-ru').textContent  = w.ex_ru;
  document.getElementById('ex-jp').textContent  = w.ex_jp;
  document.getElementById('ex-naze').textContent= w.naze;
}

/* ── Toggle example ── */
function toggleEx() {
  exOpen = !exOpen;
  document.getElementById('card-main').classList.toggle('ex-open', exOpen);
  document.getElementById('ex-panel').classList.toggle('show', exOpen);
}

/* ── Tap detection on card-main ── */
const cardMain = document.getElementById('card-main');
let tapX, tapY, tapT;
cardMain.addEventListener('touchstart', e => { tapX=e.touches[0].clientX; tapY=e.touches[0].clientY; tapT=Date.now(); }, {passive:true});
cardMain.addEventListener('touchend', e => {
  if (Math.abs(e.changedTouches[0].clientX-tapX)<12 && Math.abs(e.changedTouches[0].clientY-tapY)<12 && Date.now()-tapT<300) toggleEx();
});
cardMain.addEventListener('click', e => { if (!e.target.closest('.ex-panel')) toggleEx(); });
document.getElementById('ex-panel').addEventListener('click',    e => e.stopPropagation());
document.getElementById('ex-panel').addEventListener('touchend', e => e.stopPropagation());

/* ── Swipe navigation ── */
let swX, swY;
const cardPage = document.getElementById('page-card');
cardPage.addEventListener('touchstart', e => { swX=e.touches[0].clientX; swY=e.touches[0].clientY; }, {passive:true});
cardPage.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-swX, dy=e.changedTouches[0].clientY-swY;
  if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>44) go(dx<0?1:-1);
});

/* ── Navigate ── */
function go(dir) {
  const n = cur+dir;
  if (n<0||n>=WORDS.length) return;
  cur=n; render(dir>0?'fx-l':'fx-r'); speakNow();
}
document.getElementById('prev-btn').addEventListener('click', () => go(-1));
document.getElementById('next-btn').addEventListener('click', () => go(1));

/* ── Back ── */
document.getElementById('back-btn').addEventListener('click', () => {
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('page-card').classList.add('hidden');
  document.getElementById('page-toc').classList.remove('hidden');
});

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('page-card').classList.contains('hidden')) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
  if (e.key===' ') { e.preventDefault(); toggleEx(); }
  if (e.key==='Escape') document.getElementById('back-btn').click();
});

/* ── Speak word ── */
function speakNow() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(WORDS[cur].word);
    u.lang='ru-RU'; u.rate=0.75; u.pitch=1.0;
    window.speechSynthesis.speak(u);
  }, 320);
}
document.getElementById('speak-btn').addEventListener('click', speakNow);

/* ── Speak example sentence ── */
function speakEx() {
  if (!window.speechSynthesis) return;
  const btn = document.getElementById('ex-speak-btn');
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(WORDS[cur].ex_ru);
  u.lang='ru-RU'; u.rate=0.72; u.pitch=1.0;
  u.onstart = () => btn.classList.add('playing');
  u.onend   = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}
document.getElementById('ex-speak-btn').addEventListener('click', e => { e.stopPropagation(); speakEx(); });
document.getElementById('ex-speak-btn').addEventListener('touchend', e => { e.stopPropagation(); });
</script>
