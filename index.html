<style>

*{margin:0;padding:0;box-sizing:border-box;}

/* ── HEADER ── */
header{
  text-align:center;
  padding:50px 20px 30px;
  position:relative;
  overflow:hidden;
}
header::before{

}

.main-title{

  margin-bottom:8px;
}
.sub-title{font-size:12px;color:#444;letter-spacing:3px;margin-bottom:24px;}
.stats{
  display:inline-flex;gap:32px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:40px;padding:10px 28px;
}
.stat{text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:#C9A84C;}
.stat-label{font-size:9px;color:#444;letter-spacing:2px;}

/* ── WEEK TABS ── */
.week-tabs{
  display:flex;justify-content:center;gap:8px;
  padding:24px 20px 0;flex-wrap:wrap;
}
.tab{
  padding:8px 20px;border-radius:20px;font-size:11px;
  font-weight:600;letter-spacing:1px;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);color:#555;
  background:transparent;transition:all .25s;
}
.tab:hover{border-color:#C9A84C44;color:#C9A84C88;}
.tab.active{
  background:rgba(201,168,76,.12);
  border-color:#C9A84C66;color:#C9A84C;
}

/* ── WEEK HEADER ── */
.week-title{
  text-align:center;padding:32px 20px 8px;
}
.week-title h2{

  letter-spacing:3px;margin-bottom:4px;
}
.week-title p{font-size:11px;color:#444;letter-spacing:1px;}
.week-divider{
  width:60px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C66,transparent);
  margin:12px auto 0;
}

/* ── CARDS GRID ── */
.cards-grid{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:20px;padding:24px 24px 40px;
  max-width:1400px;margin:0 auto;
}

/* ── FLIP CARD ── */
.flip-wrap{
  width:var(--card-w);height:340px;
  perspective:1000px;cursor:pointer;
}
.flip-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}

.face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
}

/* FRONT */
.front{

  padding:20px 16px 14px;
  position:relative;
}
.front-stars{

.front-planet{

.front-grid{

  position:relative;z-index:1;

.check-btn.again{color:#dc6023;border-color:#dc602344;}

.learned-badge.show{display:block;}
.check-done{font-size:10px;}

/* Progress indicator on card */
.card-progress{
  position:absolute;top:10px;right:12px;
  width:6px;height:6px;border-radius:50%;
  background:#333;transition:background .3s;
  z-index:10;
}
.card-progress.done{background:#32c87a;}

/* ── FOOTER ── */
footer{
  text-align:center;padding:40px;
  color:#333;font-size:10px;letter-spacing:2px;

const learned = new Set();

function updateLearnedCount(){
  document.getElementById('learned-count').textContent = learned.size;
}

function makeCard(d){
  const g = d.gold;
  const wc = g ? '#C9A84C' : '#ffffff';
  const mc = g ? '#C9A84C' : d.acc;
  return `
  <div class="flip-wrap" id="card-${d.day}" data-day="${d.day}">
    <div class="flip-inner">
      <div class="face front" style="background:linear-gradient(160deg,rgb(${d.bg1||'8,8,20'}),rgb(${d.bg2||'15,15,40'}))">
        <div class="front-stars"></div>
        <div class="front-planet" style="background:radial-gradient(circle at 35% 35%,rgb(${d.planet[0]}),rgb(${d.planet[1]}));box-shadow:0 0 20px rgba(${d.planet[0]},.5)"></div>
        <div class="front-grid"></div>
        <div class="card-progress" id="prog-${d.day}"></div>
        <div class="front-day" style="--acc:${d.acc};border-color:${d.acc}44;color:${d.acc}">DAY ${String(d.day).padStart(2,'0')}${d.tag.includes('★')?' ★':''}</div>
        <div class="front-word" style="color:${wc};text-shadow:0 0 25px ${d.acc}88,0 0 50px ${d.acc}33">${d.word}</div>
        <div class="front-kana">${d.kana}</div>
        <div class="front-phonetic-row">
          <span class="front-stress">${STRESS[d.word]||''}</span>
          <button class="speak-btn" onclick="event.stopPropagation();speakWord('${d.word}')" title="発音を聞く">🔊</button>
        </div>
        <div class="front-line" style="background:linear-gradient(90deg,transparent,${d.acc},transparent)"></div>
        <div class="front-meaning-hint" style="color:${mc}">${d.meaning}</div>
        <div class="front-tag">${d.tag}</div>
        <div class="front-flip-hint">TAP TO FLIP →</div>
      </div>
      <div class="face back">
        <div class="back-topbar" style="background:${d.acc}"></div>
        <div class="back-header">
          <div class="back-word" style="color:${mc}">${d.word}</div>
          <div class="back-meaning" style="color:${mc};background:${d.acc}18;border:1px solid ${d.acc}33">${d.meaning}</div>
        </div>
        <div class="back-section">
          <div class="back-label" style="color:${d.acc}">🛸 例文</div>
          <div class="back-example">${d.ex_ru}</div>
          <div class="back-example-jp">${d.ex_jp}</div>
        </div>
        <div class="back-section" style="flex:1">
          <div class="back-label" style="color:${d.acc}">🚀 なぜこの単語？</div>
          <div class="back-text">${d.naze}</div>
        </div>
        <div class="back-section">
          <div class="back-label" style="color:${d.acc}">🐦 X投稿ドラフト</div>
          <div class="back-text" style="font-size:8px;color:#999">${d.x}</div>
        </div>
        <div class="back-check">
          <button class="check-btn again" onclick="markAgain(${d.day})">もう一度</button>
          <div class="learned-badge" id="lbadge-${d.day}">✓ LEARNED</div>
          <button class="check-btn good" onclick="markGood(${d.day})">覚えた！✓</button>
        </div>
      </div>
    </div>
  </div>`;
}

function markGood(day){
  learned.add(day);
  document.getElementById(`prog-${day}`).classList.add('done');
  document.getElementById(`lbadge-${day}`).classList.add('show');
  updateLearnedCount();
}
function markAgain(day){
  learned.delete(day);
  document.getElementById(`prog-${day}`).classList.remove('done');
  document.getElementById(`lbadge-${day}`).classList.remove('show');
  updateLearnedCount();
  // Flip back
  const wrap = document.getElementById(`card-${day}`);
  if(wrap) wrap.classList.remove('flipped');
}

// Flip on click
document.addEventListener('click', e=>{
  const wrap = e.target.closest('.flip-wrap');
  const btn = e.target.closest('.check-btn');
  if(wrap && !btn) wrap.classList.toggle('flipped');
});

// Tabs
let currentWeek = 'all';
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentWeek = tab.dataset.week;
    renderCards();
  });
});

        7:["22,16,4","55,38,8"], 8:["5,15,35","10,35,75"], 9:["15,15,30","35,35,65"],
        10:["5,5,15","15,10,35"], 11:["20,8,5","55,20,10"], 12:["5,12,35","12,28,75"],
        13:["5,14,18","12,32,42"], 14:["8,5,22","20,12,55"], 15:["5,12,28","10,22,58"],
        16:["10,5,20","25,10,50"], 17:["5,15,22","10,35,50"], 18:["5,16,12","10,40,28"],
        19:["22,16,4","55,38,8"], 20:["5,10,22","10,22,55"], 21:["22,16,4","55,38,8"],
        22:["10,7,20","25,15,48"], 23:["22,16,4","55,38,8"], 24:["5,10,22","10,22,55"],

      d.bg1 = bgs[d.day]?.[0] || "8,8,20";

    html+=`
    <div class="week-title">

  });
  container.innerHTML = html;
  // Restore learned state
  learned.forEach(day=>{
    const p = document.getElementById(`prog-${day}`);
    const b = document.getElementById(`lbadge-${day}`);
    if(p) p.classList.add('done');
    if(b) b.classList.add('show');
  });
}

renderCards();
</script>
