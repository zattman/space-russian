<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 宇宙ロシア語 単語帳</title>
<style>
:root { --gold:#C9A84C; --dark:#07070f; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { background:var(--dark); color:#fff; font-family:'Helvetica Neue',Arial,sans-serif; }

.stars-bg {
  position:fixed; inset:0; pointer-events:none; z-index:0;

    radial-gradient(1px 1px at 94% 33%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 4% 41%,#fff,transparent),
    radial-gradient(1px 1px at 17% 54%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 31% 47%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 47% 61%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 62% 69%,#fff,transparent),
    radial-gradient(1px 1px at 77% 57%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 89% 74%,rgba(255,255,255,.8),transparent),
    radial-gradient(1px 1px at 11% 81%,#fff,transparent),
    radial-gradient(1px 1px at 34% 87%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.5px 1.5px at 59% 91%,#fff,transparent),
    radial-gradient(1px 1px at 74% 84%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 49% 49%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 21% 29%,rgba(255,255,255,.5),transparent),
    radial-gradient(1px 1px at 43% 72%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 86% 42%,rgba(255,255,255,.55),transparent),
    radial-gradient(1.5px 1.5px at 3% 68%,#fff,transparent),
    radial-gradient(1px 1px at 66% 38%,rgba(255,255,255,.4),transparent);
}

/* ═══ TOC ═══ */
#page-toc {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease;
}
#page-toc.hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }

.toc-header {
  padding:20px 20px 10px; text-align:center; flex-shrink:0;
  background:linear-gradient(180deg,rgba(7,7,15,.95) 60%,transparent);
}
.toc-logo  { font-size:8px; letter-spacing:5px; color:rgba(201,168,76,.4); margin-bottom:6px; }
.toc-title {
  font-size:22px; font-weight:900; letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),#fff 55%,var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px;
}
.toc-sub { font-size:9px; color:#3a3a50; letter-spacing:3px; }
.toc-scroll { flex:1; overflow-y:auto; padding:10px 12px 24px; -webkit-overflow-scrolling:touch; }
.toc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.toc-item {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:12px; padding:13px 10px; cursor:pointer;
  transition:all .18s; display:flex; flex-direction:column; gap:3px;
  position:relative; overflow:hidden;
}
.toc-item::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--c,transparent) 0%,transparent 70%);
  opacity:.06; pointer-events:none;
}
.toc-item:active { transform:scale(.96); background:rgba(255,255,255,.09); }
.toc-day    { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--c,#4a78dc); }
.toc-word   { font-size:20px; font-weight:900; color:#fff; line-height:1.1; }
.toc-meaning{ font-size:11px; color:#666; margin-top:1px; }

/* ═══ FLASHCARD ═══ */
#page-card {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:transform .35s ease, opacity .35s ease; overflow:hidden;
}
#page-card.hidden { transform:translateY(100%); opacity:0; pointer-events:none; }

.card-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 6px; flex-shrink:0; z-index:2;
}
.back-btn {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#888; font-size:11px; padding:7px 15px; border-radius:20px;
  cursor:pointer; transition:all .2s; letter-spacing:1px;
}
.back-btn:active { background:rgba(255,255,255,.16); color:#fff; }
.card-day-badge {
  font-size:10px; font-weight:700; letter-spacing:3px;
  padding:5px 16px; border-radius:14px; border:1px solid;
}
.speak-btn {
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#888; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.speak-btn:active { background:rgba(201,168,76,.25); border-color:var(--gold); color:var(--gold); }

/* ── card body ── */
.card-main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0 28px; z-index:2; text-align:center;
  user-select:none; cursor:pointer;
  position:relative; overflow:hidden;
}

/* ── background image (large faded emoji) ── */
.card-bg-img {
  position:absolute;
  font-size:clamp(180px, 48vw, 260px);
  line-height:1;
  opacity:0.055;
  pointer-events:none;
  filter:blur(3px);
  z-index:0;
  bottom:-10px;
  right:-10px;
  transform:rotate(-12deg);
  transition:opacity .4s ease;
  user-select:none;
}
.card-main.ex-open .card-bg-img { opacity:0.025; }

/* ── word section ── */
.word-section {
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none; position:relative; z-index:1;
  transition:transform .35s ease;
}
.card-main.ex-open .word-section { transform:translateY(-18px); }

.card-word    { font-size:clamp(52px,15vw,96px); font-weight:900; line-height:1.05; letter-spacing:2px; margin-bottom:14px; }
.card-stress  { font-size:15px; color:rgba(255,255,255,.38); letter-spacing:2px; font-style:italic; margin-bottom:10px; }
.card-romaji  { font-size:17px; color:rgba(255,255,255,.6); letter-spacing:3px; margin-bottom:22px; }
.card-divider { width:56px; height:2px; border-radius:1px; margin-bottom:20px; }
.card-meaning { font-size:30px; font-weight:700; letter-spacing:2px; }
.tap-hint     { font-size:9px; color:rgba(255,255,255,.18); letter-spacing:3px; margin-top:16px; transition:opacity .3s; }
.card-main.ex-open .tap-hint { opacity:0; }

/* ── example bottom sheet ── */
.ex-panel {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(8,8,22,0.97);
  backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.1);
  border-radius:22px 22px 0 0;
  padding:6px 22px 22px;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);
  z-index:5; cursor:default;
}
.ex-panel.show { transform:translateY(0); }

.ex-handle   { width:36px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:0 auto 14px; }
.ex-tag      { font-size:8px; font-weight:700; letter-spacing:3px; margin-bottom:8px; }
.ex-ru       { font-size:16px; font-weight:600; color:#e8e8e8; line-height:1.45; margin-bottom:4px; }
.ex-jp       { font-size:13px; color:#888; margin-bottom:12px; line-height:1.4; }
.ex-hr       { height:1px; background:rgba(255,255,255,.07); margin-bottom:10px; }
.ex-naze-tag { font-size:8px; font-weight:700; letter-spacing:2px; color:var(--gold); margin-bottom:6px; }
.ex-naze     { font-size:12px; color:#aaa; line-height:1.65; }

/* ── bottom nav ── */
.card-bottom {
  flex-shrink:0; padding:10px 24px 26px;
  display:flex; flex-direction:column; gap:12px;
  align-items:center; z-index:2;
}
.card-counter { font-size:10px; color:#444; letter-spacing:3px; }
.card-nav     { display:flex; align-items:center; gap:20px; }
.nav-btn {
  width:54px; height:54px; border-radius:50%;
  border:1px solid rgba(255,255,255,.11); background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.65); font-size:26px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s; line-height:1;
}
.nav-btn:active   { background:rgba(255,255,255,.15); color:#fff; }
.nav-btn:disabled { opacity:.18; cursor:default; }
.progress-bar  { width:100%; height:3px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold),#fff); transition:width .3s ease; }

.card-main.fx-left  { animation:fxL .28s ease forwards; }
.card-main.fx-right { animation:fxR .28s ease forwards; }
@keyframes fxL { 0%{opacity:1;transform:none} 40%{opacity:0;transform:translateX(-28px)} 41%{opacity:0;transform:translateX(28px)} 100%{opacity:1;transform:none} }
@keyframes fxR { 0%{opacity:1;transform:none} 40%{opacity:0;transform:translateX(28px)} 41%{opacity:0;transform:translateX(-28px)} 100%{opacity:1;transform:none} }
</style>
</head>

let cur = 0;
let exOpen = false;

/* ── Build TOC ── */
const grid = document.getElementById('toc-grid');
WORDS.forEach((w, i) => {
  const el = document.createElement('div');
  el.className = 'toc-item';
  el.style.setProperty('--c', w.color);
  el.innerHTML = `<div class="toc-day">DAY ${String(w.day).padStart(2,'0')}</div>
    <div class="toc-word">${w.word}</div>
    <div class="toc-meaning">${w.meaning}</div>`;
  el.addEventListener('click', () => openCard(i));
  grid.appendChild(el);
});

/* ── Open card ── */
function openCard(index) {
  cur = index; exOpen = false;
  render(null);
  document.getElementById('page-toc').classList.add('hidden');
  document.getElementById('page-card').classList.remove('hidden');
  speakNow();
}

/* ── Render ── */
function render(fx) {
  const w = WORDS[cur];
  const main  = document.getElementById('card-main');
  const panel = document.getElementById('ex-panel');

  exOpen = false;
  main.classList.remove('ex-open');
  panel.classList.remove('show');

  if (fx) {
    main.classList.add(fx);
    setTimeout(() => main.classList.remove(fx), 300);
  }

  document.getElementById('card-bg-img').textContent = w.img;
  document.getElementById('card-day').textContent    = `DAY ${String(w.day).padStart(2,'0')}`;
  document.getElementById('card-day').style.cssText  = `border-color:${w.color};color:${w.color}`;
  document.getElementById('card-word').textContent   = w.word;
  document.getElementById('card-word').style.cssText = `color:${w.color};text-shadow:0 0 40px ${w.color}55,0 0 80px ${w.color}22`;
  document.getElementById('card-stress').textContent  = w.stress;
  document.getElementById('card-romaji').textContent  = w.romaji;
  document.getElementById('card-divider').style.background = `linear-gradient(90deg,transparent,${w.color},transparent)`;
  document.getElementById('card-meaning').textContent = w.meaning;
  document.getElementById('card-meaning').style.color = w.color;
  document.getElementById('card-counter').textContent = `${cur + 1} / ${WORDS.length}`;
  document.getElementById('prog-fill').style.width    = `${((cur + 1) / WORDS.length) * 100}%`;
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === WORDS.length - 1;

  document.getElementById('ex-tag').style.color = w.color;
  document.getElementById('ex-ru').textContent   = w.ex_ru;
  document.getElementById('ex-jp').textContent   = w.ex_jp;
  document.getElementById('ex-naze').textContent = w.naze;
}

/* ── Toggle example ── */
function toggleEx() {
  exOpen = !exOpen;
  document.getElementById('card-main').classList.toggle('ex-open', exOpen);
  document.getElementById('ex-panel').classList.toggle('show', exOpen);
}

/* ── Tap on card body ── */
const cardMain = document.getElementById('card-main');
let tapX, tapY, tapT;

cardMain.addEventListener('touchstart', e => {
  tapX = e.touches[0].clientX;
  tapY = e.touches[0].clientY;
  tapT = Date.now();
}, { passive:true });

cardMain.addEventListener('touchend', e => {
  const dx = Math.abs(e.changedTouches[0].clientX - tapX);
  const dy = Math.abs(e.changedTouches[0].clientY - tapY);
  if (dx < 12 && dy < 12 && Date.now() - tapT < 300) toggleEx();
});

cardMain.addEventListener('click', e => {
  if (e.target.closest('.ex-panel')) return;
  toggleEx();
});

document.getElementById('ex-panel').addEventListener('click',    e => e.stopPropagation());
document.getElementById('ex-panel').addEventListener('touchend', e => e.stopPropagation());

/* ── Swipe navigation ── */
let swX, swY;
const cardPage = document.getElementById('page-card');
cardPage.addEventListener('touchstart', e => { swX = e.touches[0].clientX; swY = e.touches[0].clientY; }, { passive:true });
cardPage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swX;
  const dy = e.changedTouches[0].clientY - swY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) go(dx < 0 ? 1 : -1);
});

/* ── Navigate ── */
function go(dir) {
  const n = cur + dir;
  if (n < 0 || n >= WORDS.length) return;
  cur = n;
  render(dir > 0 ? 'fx-left' : 'fx-right');
  speakNow();
}
document.getElementById('prev-btn').addEventListener('click', () => go(-1));
document.getElementById('next-btn').addEventListener('click', () => go(1));

/* ── Back ── */
document.getElementById('back-btn').addEventListener('click', () => {
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('page-card').classList.add('hidden');
  document.getElementById('page-toc').classList.remove('hidden');
});

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('page-card').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
  if (e.key === ' ') { e.preventDefault(); toggleEx(); }
  if (e.key === 'Escape') document.getElementById('back-btn').click();
});

/* ── Speak ── */
function speakNow() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(WORDS[cur].word);
    u.lang = 'ru-RU'; u.rate = 0.75; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }, 320);
}
document.getElementById('speak-btn').addEventListener('click', speakNow);
</script>
