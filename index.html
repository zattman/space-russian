<style>
:root{--gold:#C9A84C;--dark:#080810;--card-w:220px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--dark);
  color:#fff;
  font-family:'Helvetica Neue',Arial,sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(74,120,220,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(201,168,76,.04) 0%,transparent 50%);
}

/* ── HEADER ── */
header{
  text-align:center;
  padding:50px 20px 30px;
  position:relative;
  overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(201,168,76,.04) 0%,transparent 100%);
  pointer-events:none;
}
.logo{font-size:9px;letter-spacing:6px;color:#C9A84C88;margin-bottom:10px;}
.main-title{
  font-size:32px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#C9A84C,#fff 50%,#C9A84C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.sub-title{font-size:12px;color:#444;letter-spacing:3px;margin-bottom:24px;}
.stats{
  display:inline-flex;gap:32px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:40px;padding:10px 28px;
}
.stat{text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:#C9A84C;}
.stat-label{font-size:9px;color:#444;letter-spacing:2px;}

/* ── WEEK TABS ── */
.week-tabs{
  display:flex;justify-content:center;gap:8px;
  padding:24px 20px 0;flex-wrap:wrap;
}
.tab{
  padding:8px 20px;border-radius:20px;font-size:11px;
  font-weight:600;letter-spacing:1px;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);color:#555;
  background:transparent;transition:all .25s;
}
.tab:hover{border-color:#C9A84C44;color:#C9A84C88;}
.tab.active{
  background:rgba(201,168,76,.12);
  border-color:#C9A84C66;color:#C9A84C;
}

/* ── WEEK HEADER ── */
.week-title{
  text-align:center;padding:32px 20px 8px;
}
.week-title h2{
  font-size:14px;font-weight:700;color:#C9A84C;
  letter-spacing:3px;margin-bottom:4px;
}
.week-title p{font-size:11px;color:#444;letter-spacing:1px;}
.week-divider{
  width:60px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C66,transparent);
  margin:12px auto 0;
}

/* ── CARDS GRID ── */
.cards-grid{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:20px;padding:24px 24px 40px;
  max-width:1400px;margin:0 auto;
}

/* ── FLIP CARD ── */
.flip-wrap{
  width:var(--card-w);height:360px;
  perspective:1000px;cursor:pointer;
}
.flip-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}

.face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
}

/* FRONT */
.front{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 16px 14px;
  position:relative;
}
.front-stars{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,#fff 0%,transparent 100%),

}
.front-planet{
  position:absolute;top:12px;right:-10px;
  width:50px;height:50px;border-radius:50%;
  opacity:.6;
}
.front-grid{
  position:absolute;inset:0;
  background-image:

}
.front-day{

  border:1px solid var(--acc,#4a78dc);

  margin-bottom:auto;align-self:flex-start;
  position:relative;z-index:1;
}
.front-word{
  font-size:52px;font-weight:900;
  line-height:1;letter-spacing:1px;
  text-align:center;
  position:relative;z-index:1;
  margin:auto 0;
}
.front-kana{
  font-size:11px;color:#888;letter-spacing:1.5px;
  margin-top:6px;position:relative;z-index:1;
}
.front-phonetic-row{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:4px;position:relative;z-index:1;
}
.front-stress{
  font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;font-style:italic;
}
.speak-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);

.speak-btn:hover{background:rgba(201,168,76,.3);border-color:#C9A84C88;color:#C9A84C;}

  border-radius:1px;position:relative;z-index:1;
}
.front-meaning-hint{
  font-size:13px;font-weight:700;
  position:relative;z-index:1;
}
.front-tag{
  font-size:8px;color:#555;letter-spacing:.5px;
  margin-top:4px;position:relative;z-index:1;
  text-align:center;
}
.front-flip-hint{
  position:absolute;bottom:10px;right:12px;
  font-size:7px;color:#333;letter-spacing:1px;
}

  border-radius:8px;padding:8px 10px;

  font-size:7px;font-weight:700;letter-spacing:2px;
  margin-bottom:4px;
}
.back-text{font-size:9px;line-height:1.6;color:#bbb;}
.back-example{

.back-example-kana{font-size:10px;color:#a8a8cc;letter-spacing:.8px;margin-bottom:3px;font-style:italic;background:rgba(120,120,200,.07);border-left:2px solid rgba(140,140,220,.25);padding:2px 6px;border-radius:0 4px 4px 0;}
.back-example-jp{font-size:9px;color:#666;}
.back-check{
  display:flex;justify-content:space-between;
  align-items:center;margin-top:auto;
  padding-top:6px;border-top:1px solid rgba(255,255,255,.05);

.check-btn{
  font-size:8px;font-weight:700;letter-spacing:1px;
  padding:4px 10px;border-radius:8px;cursor:pointer;
  border:1px solid;transition:all .2s;
}
.check-btn.good{color:#32c87a;border-color:#32c87a44;}
.check-btn.good:hover{background:#32c87a22;}
.check-btn.again{color:#dc6023;border-color:#dc602344;}
.check-btn.again:hover{background:#dc602322;}
.learned-badge{
  font-size:7px;font-weight:700;letter-spacing:2px;
  color:#32c87a;display:none;
}
.learned-badge.show{display:block;}
.check-done{font-size:10px;}

/* Progress indicator on card */
.card-progress{
  position:absolute;top:10px;right:12px;

  z-index:10;
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:40px;
  color:#333;font-size:10px;letter-spacing:2px;

        <div class="front-kana">${d.kana}</div>
        <div class="front-phonetic-row">

        </div>
        <div class="front-line" style="background:linear-gradient(90deg,transparent,${d.acc},transparent)"></div>
        <div class="front-meaning-hint" style="color:${mc}">${d.meaning}</div>
        <div class="front-tag">${d.tag}</div>
        <div class="front-flip-hint">TAP TO FLIP →</div>
      </div>
      <div class="face back">
        <div class="back-topbar" style="background:${d.acc}"></div>
        <div class="back-header">
          <div class="back-word" style="color:${mc}">${d.word}</div>
          <div class="back-meaning" style="color:${mc};background:${d.acc}18;border:1px solid ${d.acc}33">${d.meaning}</div>
        </div>

}

function markGood(day){
  learned.add(day);
  document.getElementById(`prog-${day}`).classList.add('done');
  document.getElementById(`lbadge-${day}`).classList.add('show');
  updateLearnedCount();
}
function markAgain(day){
  learned.delete(day);
  document.getElementById(`prog-${day}`).classList.remove('done');
  document.getElementById(`lbadge-${day}`).classList.remove('show');
  updateLearnedCount();
  const wrap = document.getElementById(`card-${day}`);
  if(wrap) wrap.classList.remove('flipped');
}

document.addEventListener('click', e=>{
  const wrap = e.target.closest('.flip-wrap');
  const btn = e.target.closest('.check-btn');
  if(wrap && !btn) wrap.classList.toggle('flipped');
});

});
